name: Node.js CI & Publish to NPM

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test-and-build:
    name: Test & Build Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Node & Python Dependencies
        run: npm ci

      - name: Test Package Build (npm pack)
        run: npm pack

  publish-npm:
    name: Publish to npmjs.com
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: npm ci

      - name: Auto-increment version and sync
        run: |
          node -e "
            const fs = require('fs');
            const { execSync } = require('child_process');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            const localVersion = pkg.version;
            let latestVersion = '0.0.0';
            try {
              latestVersion = execSync('npm view crewlyze version', { encoding: 'utf8' }).trim();
            } catch (e) {
              console.log('Package not found or private. Using 0.0.0 as baseline.');
            }
            const parseVersion = v => v.split('.').map(Number);
            const [localMajor, localMinor, localPatch] = parseVersion(localVersion);
            const [latestMajor, latestMinor, latestPatch] = parseVersion(latestVersion);
            let targetVersion = localVersion;
            const isLocalGreater = localMajor > latestMajor || (localMajor === latestMajor && localMinor > latestMinor) || (localMajor === latestMajor && localMinor === latestMinor && localPatch > latestPatch);
            if (!isLocalGreater) {
              targetVersion = latestMajor + '.' + latestMinor + '.' + (latestPatch + 1);
            }
            console.log('Local version in repo: ' + localVersion);
            console.log('Latest version on npm: ' + latestVersion);
            console.log('Target version to publish: ' + targetVersion);
            pkg.version = targetVersion;
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node ./bin/sync-version.js

      - name: Publish to public npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
